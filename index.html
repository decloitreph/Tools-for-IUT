<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice Audit - English Class</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 2rem; background: #f0f2f5; color: #1c1e21; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); max-width: 500px; margin: auto; }
        input { width: 90%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #007bff; }
        
        /* Toggle Switch Styling */
        .btn-rec { background: #28a745; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3); }
        .btn-rec.active { background: #dc3545; box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4); transform: scale(0.98); }
        .btn-rec:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        #status { margin-top: 1.5rem; font-weight: 600; color: #555; height: 24px; }
        #transcript { margin-top: 1.5rem; padding: 15px; background: #f8f9fa; border-radius: 10px; border: 1px dashed #ccc; min-height: 80px; line-height: 1.6; color: #333; text-align: left; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin-top:0;">English Voice Audit</h2>
        <input type="text" id="studentName" placeholder="Enter Student Name...">
        
        <button id="toggleBtn" class="btn-rec">START RECORDING</button>
        
        <div id="status">Status: Ready</div>
        <div id="transcript">Your speech will appear here...</div>
    </div>

    <script>
        // 1. YOUR SETTINGS
        const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_EXEC_URL"; 
        const LANGUAGE = 'en-US'; // Set for English class

        // 2. ELEMENT SELECTORS
        const btn = document.getElementById('toggleBtn');
        const status = document.getElementById('status');
        const transcriptDiv = document.getElementById('transcript');
        const nameInput = document.getElementById('studentName');

        let isRecording = false;
        let recognition;
        let finalTranscript = "";

        // 3. INITIALIZE SPEECH ENGINE
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SR) {
            status.innerText = "Error: Browser not supported. Use Chrome.";
            btn.disabled = true;
        } else {
            recognition = new SR();
            recognition.lang = LANGUAGE;
            recognition.continuous = true;
            recognition.interimResults = true;

            // Handle live results
            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                transcriptDiv.innerHTML = '<span style="color:#000">' + finalTranscript + '</span>' + 
                                          '<span style="color:#888">' + interimTranscript + '</span>';
            };

            recognition.onerror = (event) => {
                console.error("Speech Error:", event.error);
                status.innerText = "Error: " + event.error;
                stopProcess();
            };

            recognition.onend = () => {
                if (isRecording) recognition.start(); // Keep alive if we haven't manually stopped
            };
        }
