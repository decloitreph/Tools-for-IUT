<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Class - Voice Audit</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        #toggleBtn { 
            padding: 20px 40px; font-size: 20px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 50px; color: white; background: #28a745;
            transition: 0.3s; width: 100%;
        }
        .recording { background: #dc3545 !important; }
        #status { margin: 20px 0; font-weight: bold; color: #555; }
        #transcript { border: 1px solid #ddd; padding: 15px; min-height: 100px; border-radius: 8px; background: #fff; text-align: left; }
    </style>
</head>
<body>

<div class="box">
    <h2>Audit Sprint</h2>
    <input type="text" id="studentName" placeholder="Student Name" style="width:100%; padding:10px; margin-bottom:20px; box-sizing:border-box;">
    
    <button id="toggleBtn">START RECORDING</button>
    
    <div id="status">System: Ready</div>
    <div id="transcript">Speech will appear here...</div>
</div>

<script>
    // 1. SETTINGS
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFQftZVr5yaQwerxCqVSmySB_8szJblnEtfKxksejx_LCSZgAEcNNsyazDj7e-Cx8qcA/exec"; 
    
    const btn = document.getElementById('toggleBtn');
    const status = document.getElementById('status');
    const transcriptDiv = document.getElementById('transcript');
    const nameInput = document.getElementById('studentName');

    let isRecording = false;
    let recognition;

    // 2. SETUP ENGINE
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SR) {
        status.innerText = "ERROR: Browser not supported. Use Chrome.";
    } else {
        recognition = new SR();
        recognition.lang = 'en-US';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onstart = () => {
            console.log("Recognition started successfully");
            status.innerText = "System: 🔴 Listening...";
        };

        recognition.onresult = (event) => {
            let text = "";
            for (let i = 0; i < event.results.length; i++) {
                text += event.results[i][0].transcript;
            }
            transcriptDiv.innerText = text;
        };

        recognition.onerror = (event) => {
            console.error("Engine Error:", event.error);
            status.innerText = "Error: " + event.error;
            stopRecording();
        };
    }

    // 3. THE TOGGLE SWITCH
    btn.onclick = function() {
        console.log("Button clicked. Current state:", isRecording);
        
        if (!isRecording) {
            if (!nameInput.value) {
                alert("Please enter a name first!");
                return;
            }
            startRecording();
        } else {
            stopRecording();
        }
    };

    function startRecording() {
        isRecording = true;
        btn.innerText = "STOP & SAVE";
        btn.classList.add('recording');
        transcriptDiv.innerText = "";
        try {
            recognition.start();
        } catch (e) {
            console.error("Start failed:", e);
        }
    }

    function stopRecording() {
        isRecording = false;
        btn.innerText = "START RECORDING";
        btn.classList.remove('recording');
        status.innerText = "System: ⏳ Saving...";
        recognition.stop();
        sendData();
    }

    async function sendData() {
        const text = transcriptDiv.innerText;
        if (!text || text === "Speech will appear here...") {
            status.innerText = "System: No speech detected.";
            return;
        }

        const formData = new URLSearchParams();
        formData.append('name', nameInput.value);
        formData.append('transcript', text);

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            });
            status.innerText = "System: ✅ Data Sent!";
        } catch (e) {
            status.innerText = "System: ❌ Connection Error";
        }
    }
</script>

</body>
</html>
