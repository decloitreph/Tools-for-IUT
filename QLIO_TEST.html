        /* New styles for the integrated app header */
        .app-header {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #e0e0e0;
            height: 60px;
            position: relative; /* Base for absolute logo positioning */

        .app-header .header-logo {
            position: absolute;

        .app-header .header-title {
            font-size: 24px;

            color: #1a73e8;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Original App Content Styles (with slightly increased top padding) */
        .app-body { padding: 25px; }
        #studentDisplay { font-size: 18px; font-weight: bold; color: #333; background: #e8f0fe; padding: 10px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #1a73e8; text-align: left; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        #micBtn { grid-column: span 2; background: #1a73e8; color: white; font-size: 18px; }
        #micBtn.recording { background: #dc3545; }
        #sendBtn { background: #28a745; color: white; }
        #redoBtn { background: #6c757d; color: white; }
        button:disabled { background: #ccc !important; opacity: 0.6; cursor: not-allowed; }
        #status { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 10px; }
        #transcript { background: #f8f9fa; border: 2px dashed #d1d5db; padding: 15px; min-height: 120px; border-radius: 10px; text-align: left; color: #333; font-size: 16px; margin-bottom: 10px; overflow-wrap: break-word; }
    </style>
</head>
